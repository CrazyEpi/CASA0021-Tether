name: gpp_fitness_tracker
description: A cycling-focused GPS tracking app for CASA0021 GPP project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  mqtt_client: ^10.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0
  flutter_blue_plus: ^1.35.5
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  # Add custom fonts here when available
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/Font-Regular.ttf
