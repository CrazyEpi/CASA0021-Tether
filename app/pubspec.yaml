name: gpp_fitness_tracker
description: A cycling-focused GPS tracking app for CASA0021 GPP project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  mqtt_client: ^10.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  google_maps_flutter: ^2.9.0
  http: ^1.2.0
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  flutter_reactive_ble: ^5.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  location: ^8.0.1
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  # Add custom fonts here when available
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/Font-Regular.ttf
